<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculators Hub</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-color: #ffffff;
            --accent-color: #00d2ff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
            color: var(--text-color);
        }

        .container {
            width: 100%;
            max-width: 500px; /* Mobile app feel on desktop */
            margin-top: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            font-weight: 300;
            letter-spacing: 2px;
            font-size: 2rem;
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .calc-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            text-decoration: none;
            color: white;
            transition: transform 0.2s, background 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .calc-card:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.2);
        }

        .calc-card i {
            font-size: 1.8rem;
            margin-bottom: 12px;
            color: var(--accent-color);
        }

        .calc-card span {
            font-size: 0.85rem;
            font-weight: 500;
            line-height: 1.2;
        }

        /* Full width for specific items or odd numbers */
        .full-width {
            grid-column: span 2;
        }

        footer {
            margin-top: 40px;
            text-align: center;
            font-size: 0.7rem;
            opacity: 0.7;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Smart Tools</h1>
    </header>

    <div class="grid">
        <a href="https://naar04.github.io/calculators/advanced-income-tax-calculator-pakistan.html" class="calc-card">
            <i class="fas fa-file-invoice-dollar"></i>
            <span>Advanced Tax</span>
        </a>
        
        <a href="https://naar04.github.io/calculators/income-tax-calculator-2025-26.html" class="calc-card">
            <i class="fas fa-calculator"></i>
            <span>Tax 2025-26</span>
        </a>

        <a href="https://naar04.github.io/calculators/currency-converter-pakistan-2026-pkr-to.html" class="calc-card">
            <i class="fas fa-coins"></i>
            <span>Currency</span>
        </a>

        <a href="https://naar04.github.io/calculators/emi-calculator-monthly-installment-tool.html" class="calc-card">
            <i class="fas fa-credit-card"></i>
            <span>EMI Tool</span>
        </a>

        <a href="https://naar04.github.io/calculators/loan-eligibility-calculator-pakistan.html" class="calc-card">
            <i class="fas fa-hand-holding-usd"></i>
            <span>Loan Eligibility</span>
        </a>

        <a href="https://naar04.github.io/calculators/savings-goal-calculator-pakistan-2026.html" class="calc-card">
            <i class="fas fa-piggy-bank"></i>
            <span>Savings Goal</span>
        </a>

        <a href="https://naar04.github.io/calculators/savings-investment-calculator-pakistan.html" class="calc-card">
            <i class="fas fa-chart-line"></i>
            <span>Investment</span>
        </a>

        <a href="https://naar04.github.io/calculators/solar-savings-calculator-pakistan-2026.html" class="calc-card">
            <i class="fas fa-solar-panel"></i>
            <span>Solar Savings</span>
        </a>

        <a href="https://naar04.github.io/calculators/zakat-calculator-based-on-silver-nisab.html" class="calc-card">
            <i class="fas fa-hand-holding-heart"></i>
            <span>Zakat (Silver)</span>
        </a>

        <a href="https://naar04.github.io/calculators/age-calculator-2026-exact-age-in-years.html" class="calc-card">
            <i class="fas fa-birthday-cake"></i>
            <span>Age Calc</span>
        </a>

        <a href="https://naar04.github.io/calculators/Youtube_calculator.html" class="calc-card full-width">
            <i class="fab fa-youtube"></i>
            <span>YouTube Calculator</span>
        </a>
    </div>

    <footer>
        © 2026 Calculator Suite • Designed for Android
    </footer>
</div>

</body>
</html>
