<!DOCTYPE html>
<html>
<head>
  <title>Pakistan Tax Calculator 2025-26</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <div class="card">

      <h1>Income Tax Calculator</h1>
      <p class="sub">Pakistan • Tax Year 2025–26</p>

      <label>Monthly Income</label>
      <input id="income" placeholder="e.g. 100000" />

      <button onclick="calculateTax()">Calculate Tax</button>

      <div id="result" class="result"></div>

      <p class="note">
        ⚠ This is an estimated calculation based on current tax slabs.
      </p>

    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
